name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Lint
        run: make lint
