name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 1.0.0)"
        required: true
        type: string

jobs:
  build-debs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y fakeroot debhelper

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5"

      - name: Install dependencies
        run: |
          opam install . --deps-only
          cd extension && npm ci

      - name: Write extension signing key
        run: echo "${{ vars.EXTENSION_SIGNING_KEY }}" > extension/key.pem

      - name: Build Debian packages
        run: opam exec -- make deb VERSION=${{ inputs.version }}

      - name: Upload url-router deb
        uses: actions/upload-artifact@v4
        with:
          name: url-router_${{ inputs.version }}_amd64.deb
          path: _build/deb/url-router_*.deb

      - name: Upload url-router-client deb
        uses: actions/upload-artifact@v4
        with:
          name: url-router-client_${{ inputs.version }}_amd64.deb
          path: _build/deb/url-router-client_*.deb
