<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Alembic / chemistry flask icon -->
  <!-- Flask neck -->
  <rect x="50" y="8" width="28" height="32" rx="4" fill="#5f6368"/>
  <!-- Neck rim -->
  <rect x="42" y="4" width="44" height="8" rx="4" fill="#5f6368"/>
  <!-- Flask body (conical) -->
  <path d="M 50,40 L 16,104 Q 12,114 22,118 L 106,118 Q 116,114 112,104 L 78,40 Z" fill="#90caf9" stroke="#5f6368" stroke-width="4" stroke-linejoin="round"/>
  <!-- Liquid -->
  <path d="M 28,92 L 100,92 Q 110,108 102,116 L 26,116 Q 18,108 28,92 Z" fill="#ffd54f" opacity="0.85"/>
  <!-- Bubbles -->
  <circle cx="48" cy="82" r="5" fill="#fff" opacity="0.7"/>
  <circle cx="72" cy="76" r="4" fill="#fff" opacity="0.5"/>
  <circle cx="82" cy="86" r="4.5" fill="#fff" opacity="0.6"/>
  <circle cx="58" cy="70" r="3" fill="#fff" opacity="0.4"/>
</svg>
