<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Alembic flask icon -->
  <!-- Flask body - conical/Erlenmeyer shape -->
  <path d="M 48,12 L 48,44 L 14,108 Q 10,116 18,120 L 110,120 Q 118,116 114,108 L 80,44 L 80,12 Z"
        fill="#e8eaed" stroke="#5f6368" stroke-width="3" stroke-linejoin="round"/>
  <!-- Neck band -->
  <rect x="44" y="10" width="40" height="6" rx="2" fill="#5f6368"/>
  <!-- Liquid fill -->
  <path d="M 30,96 L 98,96 Q 106,108 102,116 L 26,116 Q 22,108 30,96 Z"
        fill="#4285f4" opacity="0.75"/>
  <!-- Liquid surface highlight -->
  <line x1="32" y1="96" x2="96" y2="96" stroke="#4285f4" stroke-width="2" opacity="0.5"/>
  <!-- Glass highlight -->
  <path d="M 50,20 L 50,46 L 28,90" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <!-- Bubbles -->
  <circle cx="52" cy="106" r="3" fill="#fff" opacity="0.5"/>
  <circle cx="68" cy="102" r="2.5" fill="#fff" opacity="0.4"/>
  <circle cx="78" cy="108" r="2" fill="#fff" opacity="0.35"/>
</svg>
