<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Alembic (⚗️) icon -->
  <!-- Retort body — round bottom flask -->
  <circle cx="50" cy="80" r="38" fill="#b0bec5" stroke="#546e7a" stroke-width="3"/>
  <!-- Liquid inside -->
  <path d="M 18,92 Q 18,114 50,114 Q 82,114 82,92 Z" fill="#66bb6a" opacity="0.8"/>
  <!-- Neck going up-right -->
  <path d="M 74,56 Q 90,30 106,18" fill="none" stroke="#546e7a" stroke-width="8" stroke-linecap="round"/>
  <!-- Spout tip (drip nozzle) -->
  <circle cx="108" cy="16" r="4" fill="#546e7a"/>
  <!-- Highlight on flask -->
  <ellipse cx="38" cy="68" rx="12" ry="16" fill="#fff" opacity="0.25"/>
  <!-- Droplet from spout -->
  <path d="M 114,26 Q 116,32 114,36 Q 112,32 114,26 Z" fill="#66bb6a" opacity="0.9"/>
</svg>
