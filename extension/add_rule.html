<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Add Routing Rule</title>
  <style>
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 16px;
      color: #202124;
    }
    h1 { font-size: 16px; margin: 0 0 12px 0; }
    label { display: block; margin-bottom: 4px; font-weight: 500; }
    input[type="text"], select {
      width: 100%;
      padding: 8px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      font-size: 13px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 8px;
    }
    button {
      padding: 8px 16px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #f1f3f4; }
    button.primary {
      background: #1a73e8;
      color: #fff;
      border-color: #1a73e8;
    }
    button.primary:hover { background: #1765cc; }
    #error {
      color: #d93025;
      font-size: 12px;
      margin-top: 4px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h1>Add Routing Rule</h1>
  <label for="pattern">URL pattern (regex)</label>
  <input type="text" id="pattern" placeholder="https://example[.]com/.*">
  <label for="tenant">Route to tenant</label>
  <select id="tenant"><option value="">Loading…</option></select>
  <div id="error"></div>
  <div class="actions">
    <button id="btnCancel">Cancel</button>
    <button id="btnSave" class="primary">Save</button>
  </div>
  <script src="add_rule.js"></script>
</body>
</html>
