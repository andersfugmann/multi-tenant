<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Alloy — Configuration</title>
  <style>
    :root {
      --bg: #fff;
      --fg: #202124;
      --muted: #5f6368;
      --border: #dadce0;
      --surface: #f1f3f4;
      --primary: #1a73e8;
      --primary-hover: #1765cc;
      --danger: #d93025;
      --danger-hover: #b3261e;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      font-size: 14px;
      color: var(--fg);
      background: var(--surface);
      min-height: 100vh;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    header h1 {
      font-size: 22px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
    }
    .status-badge .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #aaa;
    }
    .status-badge .dot.ok { background: #34a853; }
    .status-badge .dot.err { background: #ea4335; }
    .status-badge.connected { border-color: #34a853; }
    .status-badge.disconnected { border-color: #ea4335; }

    .dot.connected { background: #34a853; }
    .dot.disconnected { background: #ea4335; }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #aaa;
      flex-shrink: 0;
    }

    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .card-header h2 {
      font-size: 15px;
      font-weight: 600;
    }
    .card-body { padding: 0; }
    .card-body.padded { padding: 16px; }
    .card-empty {
      padding: 24px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font);
      color: var(--fg);
      transition: background 0.15s;
    }
    .btn:hover { background: var(--surface); }
    .btn-sm { padding: 4px 8px; font-size: 12px; }
    .btn-primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-danger {
      color: var(--danger);
      border-color: var(--danger);
    }
    .btn-danger:hover {
      background: var(--danger);
      color: #fff;
    }
    .btn-icon {
      padding: 4px 6px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--muted);
      border-radius: 4px;
      font-size: 16px;
    }
    .btn-icon:hover { background: var(--surface); color: var(--fg); }

    /* Table rows */
    .row-item {
      display: grid;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .row-item:last-child { border-bottom: none; }

    /* Tenants grid */
    .tenant-row {
      grid-template-columns: 42px 1fr 1.5fr auto;
    }
    .color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    .tenant-info { line-height: 1.3; }
    .tenant-id { font-weight: 600; font-size: 13px; }
    .tenant-label { font-size: 12px; color: var(--muted); }
    .tenant-brand { font-style: italic; color: #1a73e8; }
    .tenant-cmd {
      font-size: 12px;
      color: var(--muted);
      font-family: "SF Mono", "Consolas", monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .row-actions {
      display: flex;
      gap: 2px;
    }

    /* Rules grid */
    .rule-row {
      grid-template-columns: 36px 1fr auto auto;
    }
    .rule-pattern {
      font-family: "SF Mono", "Consolas", monospace;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .rule-target {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--surface);
      white-space: nowrap;
    }
    .toggle {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
      background: #ccc;
    }
    .toggle.on { background: var(--primary); }
    .toggle::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s;
    }
    .toggle.on::after { transform: translateX(16px); }

    /* Forms */
    .form-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      align-items: flex-end;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }
    .form-group label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
    }
    .form-group input, .form-group select {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: var(--font);
      background: var(--bg);
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.15);
    }
    input[type="color"] {
      padding: 2px;
      height: 36px;
      width: 48px;
      cursor: pointer;
    }

    /* Inline form (for add) */
    .inline-form {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: #fafbfc;
      display: none;
    }
    .inline-form.visible { display: block; }
    .inline-form .form-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* Defaults section */
    .defaults-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .defaults-grid .form-group.full { grid-column: 1 / -1; }

    /* Footer */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
    }
    .footer .msg {
      font-size: 13px;
      color: var(--muted);
    }
    .footer .msg.error { color: var(--danger); }
    .footer .msg.success { color: #34a853; }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>⚗️ Alloy</h1>
      <div class="status-badge">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Connecting…</span>
      </div>
    </header>

    <div id="loading" class="loading">Loading configuration…</div>

    <div id="content" style="display:none">

      <!-- Tenants -->
      <div class="card">
        <div class="card-header">
          <h2>Tenants</h2>
          <button class="btn btn-sm" id="btnAddTenant">+ Add tenant</button>
        </div>
        <div class="card-body" id="tenantList"></div>
        <div class="inline-form" id="tenantForm">
          <div class="form-row">
            <div class="form-group">
              <label>ID</label>
              <input type="text" id="tfId" placeholder="work">
            </div>
            <div class="form-group">
              <label>Label</label>
              <input type="text" id="tfLabel" placeholder="Work Profile">
            </div>
            <div class="form-group" style="flex:0 0 48px">
              <label>Color</label>
              <input type="color" id="tfColor" value="#1a73e8">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Browser command</label>
              <input type="text" id="tfCmd" placeholder="chromium --profile-directory=Work">
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-sm" id="tfCancel">Cancel</button>
            <button class="btn btn-sm btn-primary" id="tfSave">Add tenant</button>
          </div>
        </div>
      </div>

      <!-- Rules -->
      <div class="card">
        <div class="card-header">
          <h2>Routing Rules</h2>
          <button class="btn btn-sm" id="btnAddRule">+ Add rule</button>
        </div>
        <div class="card-body" id="ruleList"></div>
        <div class="inline-form" id="ruleForm">
          <div class="form-row">
            <div class="form-group" style="flex:2">
              <label>Pattern (regex)</label>
              <input type="text" id="rfPattern"
                     placeholder="https?://([^.]+[.]|)example[.]com/.*">
            </div>
            <div class="form-group">
              <label>Route to</label>
              <select id="rfTarget"></select>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-sm" id="rfCancel">Cancel</button>
            <button class="btn btn-sm btn-primary" id="rfSave">Add rule</button>
          </div>
        </div>
      </div>

      <!-- Defaults -->
      <div class="card">
        <div class="card-header">
          <h2>Defaults</h2>
        </div>
        <div class="card-body padded">
          <div class="defaults-grid">
            <div class="form-group">
              <label>Unmatched URLs go to</label>
              <select id="dfUnmatched"></select>
            </div>
            <div class="form-group">
              <label>Cooldown (seconds)</label>
              <input type="number" id="dfCooldown" min="0">
            </div>
            <div class="form-group">
              <label>Browser launch timeout (seconds)</label>
              <input type="number" id="dfTimeout" min="1">
            </div>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <span class="msg" id="footerMsg"></span>
        <button class="btn btn-primary" id="btnSave">Save configuration</button>
      </div>
    </div>
  </div>
  <script src="config.js"></script>
</body>
</html>
