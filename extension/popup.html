<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Alloy</title>
  <style>
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 12px;
      color: #202124;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 8px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      padding: 8px;
      border-radius: 6px;
      background: #f1f3f4;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #aaa;
    }
    .dot.connected { background: #34a853; }
    .dot.disconnected { background: #ea4335; }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    button {
      padding: 8px 12px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      text-align: left;
    }
    button:hover { background: #f1f3f4; }

    /* Tenant status panel */
    #statusPanel {
      display: none;
      margin-top: 10px;
      border-top: 1px solid #dadce0;
      padding-top: 10px;
    }
    #statusPanel h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 0 0 6px 0;
      color: #5f6368;
    }
    .uptime {
      font-size: 12px;
      color: #5f6368;
      margin-bottom: 8px;
    }
    .tenant-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .tenant-list li {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 0;
      border-bottom: 1px solid #f1f3f4;
      font-size: 13px;
    }
    .tenant-list li:last-child { border-bottom: none; }
    .tenant-name { font-weight: 500; }
    .tenant-label {
      color: #5f6368;
      font-size: 12px;
      margin-left: auto;
    }
  </style>
</head>
<body>
  <h1>⚗️ Alloy</h1>
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Checking…</span>
  </div>
  <div class="actions">
    <button id="btnStatus">📊 View status</button>
    <button id="btnConfig">⚙️ Configure</button>
    <button id="btnReconnect">🔄 Reconnect</button>
  </div>
  <div id="statusPanel">
    <div class="uptime" id="uptime"></div>
    <h2>Tenants</h2>
    <ul class="tenant-list" id="tenantList"></ul>
  </div>
  <script src="popup.js"></script>
</body>
</html>
