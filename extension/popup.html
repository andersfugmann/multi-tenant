<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>URL Router</title>
  <style>
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 12px;
      color: #202124;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 8px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      padding: 8px;
      border-radius: 6px;
      background: #f1f3f4;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #aaa;
    }
    .dot.connected { background: #34a853; }
    .dot.disconnected { background: #ea4335; }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    button {
      padding: 8px 12px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      text-align: left;
    }
    button:hover { background: #f1f3f4; }
    #info { margin-top: 10px; font-size: 12px; color: #5f6368; }
  </style>
</head>
<body>
  <h1>🔀 URL Router</h1>
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Checking…</span>
  </div>
  <div class="actions">
    <button id="btnStatus">View status</button>
    <button id="btnConfig">⚙️ Configure</button>
    <button id="btnReconnect">Reconnect</button>
  </div>
  <div id="info"></div>
  <script src="popup.js"></script>
</body>
</html>
