<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Alloy</title>
  <style>
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 12px;
      color: #202124;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 8px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      padding: 8px;
      border-radius: 6px;
      background: #f1f3f4;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #aaa;
    }
    .dot.connected { background: #34a853; }
    .dot.disconnected { background: #ea4335; }
    h2 {
      font-size: 13px;
      font-weight: 600;
      margin: 0 0 6px 0;
      color: #5f6368;
    }
    .tenant-list {
      list-style: none;
      margin: 0 0 10px 0;
      padding: 0;
    }
    .tenant-list li {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 0;
      border-bottom: 1px solid #f1f3f4;
      font-size: 13px;
    }
    .tenant-list li:last-child { border-bottom: none; }
    .tenant-name { font-weight: 500; }
    .tenant-label {
      color: #5f6368;
      font-size: 12px;
    }
    .tenant-send {
      margin-left: auto;
      padding: 3px 8px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 11px;
      color: #1a73e8;
    }
    .tenant-send:hover { background: #e8f0fe; }
    .divider {
      border-top: 1px solid #dadce0;
      margin: 10px 0;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    button {
      padding: 8px 12px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      text-align: left;
    }
    button:hover { background: #f1f3f4; }
    #footer {
      margin-top: 10px;
      font-size: 11px;
      color: #5f6368;
      text-align: center;
    }
    #footer.error { color: #ea4335; }
    #footer.success { color: #34a853; }
  </style>
</head>
<body>
  <h1>⚗️ Alloy</h1>
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Checking…</span>
  </div>
  <h2>Tenants</h2>
  <ul class="tenant-list" id="tenantList">
    <li style="color:#5f6368">Loading…</li>
  </ul>
  <div class="divider"></div>
  <div class="actions">
    <button id="btnAddRule">📝 Add routing rule…</button>
    <button id="btnDeleteRule">🗑️ Delete matching rule</button>
    <button id="btnConfig">⚙️ Configure</button>
    <button id="btnReconnect">🔄 Reconnect</button>
  </div>
  <div id="footer"></div>
  <script src="popup.js"></script>
</body>
</html>
