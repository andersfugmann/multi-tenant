<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      margin: 0;
    }
    h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
    }
    #current-url {
      color: #666;
      font-size: 11px;
      word-break: break-all;
      margin-bottom: 12px;
    }
    .tenant-btn {
      display: block;
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 6px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      text-align: left;
      font-size: 13px;
    }
    .tenant-btn:hover {
      background: #f5f5f5;
    }
    .tenant-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }
    #remember-btn {
      display: block;
      width: 100%;
      padding: 6px 12px;
      margin-top: 8px;
      border: none;
      background: none;
      color: #1a73e8;
      cursor: pointer;
      text-align: center;
      font-size: 12px;
    }
    #remember-btn:hover {
      text-decoration: underline;
    }
    #message {
      display: none;
      padding: 8px;
      background: #e8f5e9;
      border-radius: 4px;
      margin-top: 8px;
      font-size: 12px;
    }
    #remember-section {
      margin-top: 8px;
    }
    .remember-choice {
      font-size: 12px;
      padding: 6px 10px;
    }
  </style>
</head>
<body>
  <h3>URL Router</h3>
  <div id="current-url"></div>
  <div id="tenant-buttons"></div>
  <button id="remember-btn">Remember this choice…</button>
  <div id="remember-section"></div>
  <div id="message"></div>
  <script src="dist/popup.js" type="module"></script>
</body>
</html>
