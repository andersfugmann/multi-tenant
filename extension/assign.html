<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Assign Tenant</title>
  <style>
    body {
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      margin: 0;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 15px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
      font-size: 12px;
      color: #444;
    }
    select, input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    select:focus, input[type="text"]:focus {
      outline: none;
      border-color: #1a73e8;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      font-size: 12px;
    }
    .button-row {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    button {
      padding: 8px 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover {
      background: #f5f5f5;
    }
    #save-btn {
      background: #1a73e8;
      color: #fff;
      border: none;
    }
    #save-btn:hover {
      background: #1557b0;
    }
    #save-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }
    #message {
      display: none;
      padding: 8px;
      border-radius: 4px;
      margin-top: 12px;
      font-size: 12px;
    }
    .msg-ok { background: #e8f5e9; color: #2e7d32; }
    .msg-err { background: #ffebee; color: #c62828; }
    .url-preview {
      color: #666;
      font-size: 11px;
      word-break: break-all;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <h3>Assign Tenant</h3>
  <div class="url-preview" id="url-preview"></div>

  <label for="tenant-select">Tenant</label>
  <select id="tenant-select"></select>

  <label for="pattern-input">URL pattern (regex)</label>
  <input type="text" id="pattern-input" spellcheck="false">

  <div class="checkbox-row">
    <input type="checkbox" id="also-open" checked>
    <label for="also-open" style="display:inline; font-weight:normal; margin:0;">Also open this page on the selected tenant</label>
  </div>

  <div class="button-row">
    <button id="cancel-btn">Cancel</button>
    <button id="save-btn">Save Rule</button>
  </div>

  <div id="message"></div>
  <script src="dist/assign.js" type="module"></script>
</body>
</html>
